---

# MAIN CONFIG FILE FOR SIMULATION ---> .txt files are fall-back options

# all simulation parameters are written here
simulation_parameters:
  type: "bands"
  simulation_steps: 20000000
  thermalization_steps: 3000000
  max_tau_value: 60.0
  dimensions: 3
  kx: 0.0
  ky: 0.0
  kz: 0.0
  chemical_potential: -2.3
  max_internal_order: 3000
  max_num_ext_phonons: 40
  dielectric_infty: 4.0
  simple:
    volume: 1.0
    coupling_strength: 2.0
    electron_effective_mass: 1.0
    optical_phonon_dispersion: 1.0
  bands:
    num_bands: 1
    num_phonon_modes: 2
    m_x: 1.0
    m_y: 1.3
    m_z: 1.7
    A_LK: 1.0
    B_LK: 1.0
    C_LK: 0.0
    phonon_modes:
      - 1.1
      - 2.0
    dielectric_responses:
      - 0.9
      - 0.5
    V_cell: 1.0
    V_BvK: 1.0

# all simulation settings are written here
# if exact GF = true, please specify num points and selected order
# if histo = true, please specify num bins
# if gs energy = true, please specify cutoff tau (gs energy)
# if effective mass = true, please specify cutoff tau (mass)
# if simulation_steps > 25000 in simulation_parameters.txt,
# write_diagrams is automatically set to false
# if fix_tau_value = true, please set prob_length = 0 and prob_stretch = 0,
# otherwise it will be done automatically
simulation_settings:
  histogram_method: true
  num_bins: 150
  exact_green_function: true
  num_points_exact: 120
  selected_order: -1
  gs_energy: true
  cutoff_tau_energy: 20.0
  effective_mass: true
  cutoff_tau_mass: 15.0
  Z_factor: true
  cutoff_tau_Z: 40.0
  write_diagrams: true
  time_benchmark: true
  mc_statistics: true
  cutoff_tau_statistics: 5.0
  blocking_method: true
  N_blocks: 200
  fix_tau_value: false

# cpu settings for main simulation
# if parallel_mode is off, code is sequential
# choose number of nodes in which to run the simulation
# choose number of cpus to use in each node,
# write MAX to use all available cpus
# choose number of iterations to perform
# to avoid correlations between different cpus
# set probabilities
update_probabilities:
  length_update: 0.3
  add_internal_update: 0.1
  remove_internal_update: 0.1
  add_external_update: 0.2
  remove_external_update: 0.2
  swap_phonon_update: 0.075
  shift_phonon_update: 0.015
  stretch_diagram_update: 0.010

# cpu settings for main simulation
# if parallel_mode is off, code is sequential
# parallel_type can be "start_sequential" to start sequential thermalization,
# "from_scratch" to have fully parallelized processes
# from the start (no sequential thermalization)
# choose number of nodes in which to run the simulation
# choose number of cpus to use in each node,
# write MAX to use all available cpus
# choose number of iterations to perform to avoid correlations
# between different cpus
cpu_settings:
  parallel_mode: false
  parallel_type: "from_scratch"
  num_procs: 6
  num_nodes: 1
  autocorr_steps: 100000
